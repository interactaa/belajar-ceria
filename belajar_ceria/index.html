<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Belajar Ceria | Pilih Masuk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Poppins', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 60px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3);
      overflow: hidden;
      text-align: center;
    }
    .header {
      background: linear-gradient(135deg, #f5af19, #f12711);
      padding: 2rem;
    }
    .header h1 {
      font-size: 2rem;
      color: white;
    }
    .content {
      padding: 2rem;
    }
    .role-card {
      background: linear-gradient(145deg, #ffffff, #fff5e6);
      border-radius: 50px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      border: 2px solid #ffd966;
      transition: 0.1s;
    }
    .role-card:active {
      transform: scale(0.98);
    }
    .role-emoji {
      font-size: 3rem;
    }
    .role-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c25d00;
      margin: 10px 0;
    }
    .role-desc {
      color: #8B5E3C;
    }
    .footer {
      background: #ffefcf;
      padding: 1rem;
      font-size: 0.8rem;
      color: #a5611a;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Selamat Datang</h1>
    <p style="color:white; margin-top:5px;">Sudah siapkah belajar sambil bermain?</p>
  </div>
  <div class="content">
    <div class="role-card" onclick="window.location.href='murid/dashboard.html'">
      <div class="role-emoji">🧒</div>
      <div class="role-title">Masuk sebagai Murid</div>
      <div class="role-desc">Ayo belajar dan dapatkan lencana!</div>
    </div>
    <div class="role-card" onclick="window.location.href='guru/login.html'">
      <div class="role-emoji">👩‍🏫</div>
      <div class="role-title">Masuk sebagai Guru</div>
      <div class="role-desc">Ayo lihat perkembangan para murid!</div>
    </div>
  </div>
  <div class="footer">
    ✨ Belajar jadi menyenangkan ✨
  </div>
</div>
</body>
</html>
