<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Berhitung | Belajar Ceria</title>
  <link rel="stylesheet" href="../css/style-umum.css">
  <style>
    .math-container {
      background: white;
      border-radius: 50px;
      padding: 1.5rem;
    }
    .tab-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: #ffefcf;
      padding: 6px;
      border-radius: 60px;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      color: #c25d00;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #ffb347, #ff8c42);
      color: white;
    }
    .angka-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin: 20px 0;
      max-height: 450px;
      overflow-y: auto;
      padding: 5px;
    }
    .angka-item {
      background: linear-gradient(145deg, #ffffff, #fff5e6);
      border-radius: 20px;
      padding: 12px 5px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 0 #e0a864;
      font-size: 1rem;
      font-weight: bold;
      color: #c25d00;
    }
    .quiz-type-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .type-btn {
      background: #ffe0b5;
      border: none;
      padding: 8px 14px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      color: #c25d00;
      font-size: 0.8rem;
    }
    .type-btn.active {
      background: #ffb347;
      color: white;
    }
    .kuis-container {
      text-align: center;
      padding: 25px;
      background: #fff3e0;
      border-radius: 40px;
    }
    .soal-text {
      font-size: 1.8rem;
      font-weight: bold;
      color: #c25d00;
      margin: 20px 0;
      background: white;
      padding: 20px;
      border-radius: 50px;
      display: inline-block;
    }
    .quiz-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }
    .quiz-option {
      background: #ffb347;
      border: none;
      width: 70px;
      height: 70px;
      border-radius: 40px;
      font-size: 1.3rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 0 #c25d1a;
    }
    .quiz-option.disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }
    .feedback {
      margin-top: 15px;
      padding: 12px;
      border-radius: 40px;
      font-weight: bold;
    }
    .feedback-benar {
      background: #c8e6c9;
      color: #2e7d32;
    }
    .feedback-salah {
      background: #ffcdd2;
      color: #c62828;
    }
    .skor {
      margin-top: 15px;
      font-size: 1rem;
      color: #8B5E3C;
    }
    .nav-btn {
      background: #ff8c42;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      margin-top: 15px;
    }
    .next-btn {
      background: #4caf50;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      margin-top: 15px;
      margin-left: 10px;
    }
    .back-btn-menu {
      background: #ff8c42;
      margin-bottom: 15px;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    @media (max-width: 600px) {
      .soal-text { font-size: 1.2rem; padding: 15px; }
      .quiz-option { width: 55px; height: 55px; font-size: 1rem; }
      .angka-item { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="logo"><h2>🔢 Belajar Berhitung</h2></div>
    <div class="user-info">
      <span id="userName"></span>
      <button class="logout-btn" onclick="logoutMurid()">🚪 Keluar</button>
    </div>
  </div>
  <div class="main-content" id="mainContent"></div>
</div>

<script src="../js/data.js"></script>
<script src="../js/murid.js"></script>
<script>
    let currentUser = getCurrentUser();
    if (!currentUser) window.location.href = "dashboard.html";
    document.getElementById("userName").innerHTML = `🧒 ${currentUser}`;
    
    // ========== SOUND EFFECT ==========
    function playSound(type) {
      try {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.value = 0.3;
        
        if (type === 'benar') {
          osc.frequency.value = 880;
          osc.type = 'sine';
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
          osc.stop(ctx.currentTime + 0.4);
        } else {
          osc.frequency.value = 220;
          osc.type = 'sawtooth';
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
          osc.stop(ctx.currentTime + 0.4);
        }
      } catch(e) { console.log("Audio tidak didukung"); }
    }
    
    // ========== GENERATE ANGKA ==========
    function generateAngkaList() {
      let numbers = [];
      for (let i = 1; i <= 100; i++) numbers.push(i);
      for (let i = 150; i <= 1000; i += 50) numbers.push(i);
      for (let i = 1100; i <= 10000; i += 200) numbers.push(i);
      for (let i = 11000; i <= 100000; i += 1000) numbers.push(i);
      if (!numbers.includes(100000)) numbers.push(100000);
      return numbers;
    }
    
    const angkaList = generateAngkaList();
    
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
    
    function speakNumber(num) {
      speak(formatNumber(num));
    }
    
    // ========== KUIS ==========
    let currentQuizType = "tambah";
    let currentQuestion = null;
    let currentAnswer = null;
    let currentOptions = [];
    let skor = 0;
    let soalKe = 1;
    let sudahJawab = false;
    let totalSoal = 10;
    
    function hitungEkspresi(ekspresi) {
      try {
        let expr = ekspresi.replace(/×/g, '*').replace(/÷/g, '/');
        return Math.round(Function('"use strict"; return (' + expr + ')')() * 100) / 100;
      } catch(e) { return null; }
    }
    
    function generateSoalTambah() {
      let a = Math.floor(Math.random() * 50) + 1;
      let b = Math.floor(Math.random() * 50) + 1;
      return { soal: `${a} + ${b}`, jawaban: a + b };
    }
    function generateSoalKurang() {
      let a = Math.floor(Math.random() * 50) + 1;
      let b = Math.floor(Math.random() * a) + 1;
      return { soal: `${a} - ${b}`, jawaban: a - b };
    }
    function generateSoalKali() {
      let a = Math.floor(Math.random() * 12) + 1;
      let b = Math.floor(Math.random() * 12) + 1;
      return { soal: `${a} × ${b}`, jawaban: a * b };
    }
    function generateSoalBagi() {
      let b = Math.floor(Math.random() * 12) + 1;
      let jawaban = Math.floor(Math.random() * 12) + 1;
      return { soal: `${b * jawaban} ÷ ${b}`, jawaban: jawaban };
    }
    function generateSoalCampuran() {
      let panjang = Math.floor(Math.random() * 2) + 2;
      let angka = [], operators = [];
      for (let i = 0; i <= panjang; i++) angka.push(Math.floor(Math.random() * 20) + 1);
      let operatorList = ['+', '-', '×', '÷'];
      for (let i = 0; i < panjang; i++) {
        let op = operatorList[Math.floor(Math.random() * operatorList.length)];
        if (op === '÷' && angka[i+1] === 0) op = '+';
        operators.push(op);
      }
      let soal = `${angka[0]}`;
      for (let i = 0; i < operators.length; i++) soal += ` ${operators[i]} ${angka[i+1]}`;
      let jawaban = hitungEkspresi(soal);
      if (jawaban === null || jawaban !== Math.floor(jawaban) || jawaban < 0 || jawaban > 200) return generateSoalCampuran();
      return { soal, jawaban: Math.round(jawaban) };
    }
    
    function generateSoal() {
      let result;
      if (currentQuizType === "tambah") result = generateSoalTambah();
      else if (currentQuizType === "kurang") result = generateSoalKurang();
      else if (currentQuizType === "kali") result = generateSoalKali();
      else if (currentQuizType === "bagi") result = generateSoalBagi();
      else result = generateSoalCampuran();
      
      let jawaban = result.jawaban;
      let optionsSet = new Set([jawaban]);
      while (optionsSet.size < 4) {
        let offset = Math.floor(Math.random() * 11) + 1;
        let wrong = jawaban + (Math.random() > 0.5 ? offset : -offset);
        if (wrong >= 0 && wrong <= 300) optionsSet.add(wrong);
      }
      return { question: `${result.soal} = ?`, answer: jawaban, options: Array.from(optionsSet).sort(() => Math.random() - 0.5) };
    }
    
    function loadSoalBaru() {
      if (soalKe > totalSoal) { renderHasil(); return; }
      currentQuestion = generateSoal();
      currentAnswer = currentQuestion.answer;
      currentOptions = currentQuestion.options;
      sudahJawab = false;
      renderKuisPage();
    }
    
    function cekJawaban(selected) {
      if (sudahJawab) return;
      sudahJawab = true;
      
      const feedbackDiv = document.getElementById("feedback");
      const allOptions = document.querySelectorAll(".quiz-option");
      
      allOptions.forEach(btn => {
        btn.disabled = true;
        btn.classList.add("disabled");
        if (parseInt(btn.getAttribute("data-value")) === currentAnswer) {
          btn.style.background = "#a5d6a7";
        }
      });
      
      if (parseInt(selected) === currentAnswer) {
        skor++;
        feedbackDiv.innerHTML = `<div class="feedback feedback-benar">✅ Benar! +1 poin 🎉</div>`;
        playSound('benar');
        updateMathProgress();
      } else {
        feedbackDiv.innerHTML = `<div class="feedback feedback-salah">❌ Salah! Jawaban: ${currentAnswer}</div>`;
        playSound('salah');
      }
      document.getElementById("skorTampilan").innerHTML = skor;
    }
    
    function nextSoal() {
      if (!sudahJawab) { alert("Jawab dulu ya!"); return; }
      soalKe++;
      if (soalKe > totalSoal) renderHasil();
      else loadSoalBaru();
    }
    
    function resetQuiz() {
      skor = 0; soalKe = 1; sudahJawab = false; loadSoalBaru();
    }
    
    function renderHasil() {
      let nilai = Math.round((skor / totalSoal) * 100);
      let pesan = nilai === 100 ? "🎉 Sempurna! Kamu hebat! 🎉" : (nilai >= 80 ? "🌟 Bagus sekali!" : (nilai >= 60 ? "📚 Lumayan, coba lagi!" : "💪 Jangan menyerah!"));
      let html = `
        <div class="math-container">
          <div class="back-btn-menu" onclick="goToBerhitungMenu()">← Kembali</div>
          <div class="kuis-container">
            <div style="font-size:3rem;">🏆</div>
            <h2>🎉 Kuis Selesai! 🎉</h2>
            <div style="font-size:2rem;">${skor} / ${totalSoal}</div>
            <div>${pesan}</div>
            <div>Nilai: ${nilai}%</div>
            <button class="nav-btn" onclick="ulangiKuis()" style="margin-top:20px;">🔄 Ulangi Kuis</button>
          </div>
        </div>`;
      document.getElementById("mainContent").innerHTML = html;
    }
    
    function ulangiKuis() {
      skor = 0; soalKe = 1; sudahJawab = false; loadSoalBaru();
    }
    
    function renderKuisPage() {
      let html = `
        <div class="math-container">
          <div class="back-btn-menu" onclick="goToBerhitungMenu()">← Kembali</div>
          <div class="quiz-type-selector">
            <button class="type-btn ${currentQuizType === 'tambah' ? 'active' : ''}" onclick="gantiQuizType('tambah')">➕ Penjumlahan</button>
            <button class="type-btn ${currentQuizType === 'kurang' ? 'active' : ''}" onclick="gantiQuizType('kurang')">➖ Pengurangan</button>
            <button class="type-btn ${currentQuizType === 'kali' ? 'active' : ''}" onclick="gantiQuizType('kali')">✖️ Perkalian</button>
            <button class="type-btn ${currentQuizType === 'bagi' ? 'active' : ''}" onclick="gantiQuizType('bagi')">➗ Pembagian</button>
            <button class="type-btn ${currentQuizType === 'campuran' ? 'active' : ''}" onclick="gantiQuizType('campuran')">🎲 Campuran</button>
          </div>
          <div class="kuis-container">
            <div class="soal-text">${currentQuestion.question}</div>
            <div class="quiz-options">${currentOptions.map(opt => `<button class="quiz-option" data-value="${opt}">${opt}</button>`).join('')}</div>
            <div id="feedback"></div>
            <div class="skor">📊 Skor: <span id="skorTampilan">${skor}</span> / ${totalSoal} | Soal ke-<span id="soalKe">${soalKe}</span></div>
            <button class="nav-btn" onclick="resetQuiz()">🔄 Reset</button>
            <button class="next-btn" onclick="nextSoal()">➡️ Soal Selanjutnya</button>
          </div>
        </div>`;
      document.getElementById("mainContent").innerHTML = html;
      document.querySelectorAll(".quiz-option").forEach(btn => btn.addEventListener("click", () => cekJawaban(btn.getAttribute("data-value"))));
    }
    
    // ========== NAVIGASI ==========
    let currentTab = "angka";
    
    function renderAngkaPage() {
      let html = `
        <div class="math-container">
          <div class="back-btn-menu" onclick="goToDashboard()">← Kembali</div>
          <div class="tab-nav">
            <button class="tab-btn ${currentTab === 'angka' ? 'active' : ''}" onclick="switchTab('angka')">🔢 Mengenal Angka</button>
            <button class="tab-btn ${currentTab === 'kuis' ? 'active' : ''}" onclick="switchTab('kuis')">🧮 Kuis Berhitung</button>
          </div>
          <h3 style="text-align:center;">🔢 Mengenal Angka 1 - 100.000</h3>
          <p style="text-align:center;">✨ Klik angka untuk mendengar suara ✨</p>
          <div class="angka-grid">${angkaList.map(n => `<div class="angka-item" data-angka="${n}">${formatNumber(n)}</div>`).join('')}</div>
        </div>`;
      document.getElementById("mainContent").innerHTML = html;
      document.querySelectorAll(".angka-item").forEach(item => item.addEventListener("click", () => speakNumber(parseInt(item.getAttribute("data-angka")))));
    }
    
    function switchTab(tab) {
      currentTab = tab;
      if (tab === 'angka') renderAngkaPage();
      else { skor = 0; soalKe = 1; loadSoalBaru(); }
    }
    
    function goToDashboard() { window.location.href = "dashboard.html"; }
    function goToBerhitungMenu() { currentTab = "angka"; renderAngkaPage(); }
    function gantiQuizType(type) { currentQuizType = type; resetQuiz(); }
    
    window.goToDashboard = goToDashboard;
    window.goToBerhitungMenu = goToBerhitungMenu;
    window.switchTab = switchTab;
    window.gantiQuizType = gantiQuizType;
    window.resetQuiz = resetQuiz;
    window.nextSoal = nextSoal;
    window.ulangiKuis = ulangiKuis;
    
    renderAngkaPage();
</script>
</body>
</html>
