<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dashboard Murid | Belajar Ceria</title>
  <link rel="stylesheet" href="../css/style-umum.css">
  <link rel="stylesheet" href="../css/style-murid.css">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="logo"><h2>📚 Belajar Ceria</h2></div>
    <div class="user-info" style="gap: 15px;">
      <!-- Ikon Lencana di pojok kanan atas -->
      <div id="badgeIcon" style="display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.8); padding: 5px 12px; border-radius: 40px; cursor: pointer;">
        🏆 <span id="badgeCount">0</span>
      </div>
      <span id="userName"></span>
      <button class="logout-btn" onclick="logoutMurid()">🚪 Keluar</button>
    </div>
  </div>
  <div class="main-content" id="mainContent"></div>
</div>

<!-- Modal untuk popup lencana -->
<div id="badgeModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
  <div style="background:white; border-radius:50px; padding:20px; max-width:500px; width:90%; max-height:80%; overflow:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h3 style="color:#c25d00;">🏆 Lencana Saya</h3>
      <button id="closeModal" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <div id="badgeList" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center;"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/murid.js"></script>
<script>
    let currentUser = getCurrentUser();
    
    // Tampilkan jumlah lencana di pojok
    function updateBadgeCount() {
      let progress = getStudentProgress(currentUser);
      let count = (progress.achievements || []).length;
      document.getElementById("badgeCount").innerText = count;
    }
    
    // Tampilkan modal lencana
    function showBadgeModal() {
      let progress = getStudentProgress(currentUser);
      let earnedIds = progress.achievements || [];
      let listHtml = "";
      
      for (let ach of achievements) {
        let earned = earnedIds.includes(ach.id);
        listHtml += `
          <div style="background: ${earned ? '#ffb347' : '#eee'}; border-radius: 30px; padding: 12px; text-align: center; width: 100px;">
            <div style="font-size: 2rem;">${ach.icon}</div>
            <div style="font-weight: bold; font-size: 0.8rem;">${ach.name}</div>
            <div style="font-size: 0.65rem;">${earned ? '✅ Didapat' : '🔒 Belum'}</div>
          </div>
        `;
      }
      
      document.getElementById("badgeList").innerHTML = listHtml;
      document.getElementById("badgeModal").style.display = "flex";
    }
    
    document.getElementById("badgeIcon").addEventListener("click", showBadgeModal);
    document.getElementById("closeModal").addEventListener("click", () => {
      document.getElementById("badgeModal").style.display = "none";
    });
    window.onclick = function(e) {
      if (e.target === document.getElementById("badgeModal")) {
        document.getElementById("badgeModal").style.display = "none";
      }
    }
    
    if (!checkMuridLogin()) {
        // sudah ditangani di checkMuridLogin
    } else {
        renderMuridDashboard();
        updateBadgeCount();
    }
</script>
</body>
</html>
